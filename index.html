<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cinèma Archive - Unlimited Movies, TV Shows & More</title>
  <meta name="description"
    content="Explore Filmlane Archive for the latest movies, TV series, and anime. Discover details, ratings, and where to watch your favorite titles." />
  <meta name="keywords" content="movies, tv series, anime, cinema, streaming, reviews, ratings, archive" />
  <meta name="author" content="sickkkale" />

  <!-- Open Graph / Social Media -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Cinèma Archive" />
  <meta property="og:description" content="Your ultimate cinematic destination for discovery and research." />
  <meta property="og:image" content="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=2070" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&family=Bebas+Neue&family=Inter:wght@400;600&display=swap"
    rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <!-- External Stylesheet -->
  <link rel="stylesheet" href="styles.css" />

  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3163/3163478.png" type="image/x-icon" />
</head>

<body>

  <div id="app">

    <!-- NAVIGATION HEADER -->
    <header>
      <div class="header-container">
        <a href="/" class="logo-wrap" id="home-link">
          <div class="logo-icon"><i class="fas fa-play"></i></div>
          <span class="logo-text">Cinèma</span>
        </a>

        <nav class="nav-links">
          <a href="#home">Home</a>
        </nav>
      </div>
    </header>

    <main>

      <!-- SEARCH SECTION (HERO OVERLAY STYLE) -->
      <section id="search-section">
        <div id="search-wrap">
          <div id="mode-tabs">
            <button class="active" data-mode="movie">MOVIE</button>
            <button data-mode="series">TV SHOW</button>
            <button data-mode="anime">ANIME</button>
          </div>

          <div id="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="search-input" placeholder="Search for your favorite movies..." autocomplete="on" />
            <div id="search-loader" style="display:none; padding: 0 15px;">
              <i class="fas fa-circle-notch spin" style="color:var(--accent)"></i>
            </div>
          </div>
        </div>
      </section>

      <!-- TRENDING GRID (HOME) -->
      <section id="home">
        <div class="grid-title">
          <span class="badge-new">ONLINE STREAMING</span>
          <h2>Trending This Week</h2>
        </div>
        <div id="trending-grid">
          <!-- Dynamically populated -->
        </div>
      </section>

      <!-- DETAIL VIEW (HERO OVERLAY) -->
      <section id="detail">
        <!-- Dynamically populated by app.js -->
      </section>

    </main>

    <!-- FOOTER SECTION -->
    <footer>
      <div class="footer-inner">
        <div class="footer-brand-wrap">
          <a href="/" class="logo-wrap">
            <div class="logo-icon"><i class="fas fa-play"></i></div>
            <span class="logo-text">Cinèma</span>
          </a>
        </div>

        <div class="creator-credits">
          CREATED BY <span class="creator-name">SICKKKALE</span>
        </div>

        <div class="footer-links">
          <div class="social-links">
            <a href="https://github.com/sickkkalex" target="_blank" class="social-link" title="GitHub"><i
                class="fa-brands fa-github"></i></a>
            <a href="https://www.instagram.com/saullialessioo/" target="_blank" class="social-link" title="Instagram"><i
                class="fa-brands fa-instagram"></i></a>
            <a href="https://www.behance.net/alessiosaulli1" target="_blank" class="social-link" title="Behance"><i
                class="fa-brands fa-behance"></i></a>
          </div>
        </div>
      </div>
    </footer>

  </div>

  <!-- External Script -->
  <script src="app.js"></script>
</body>

</html>
