<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO Meta Tags -->
  <title>Cinéma Archive | Film, Serie TV & Anime</title>
  <meta name="description"
    content="Cinéma Archive - Il tuo archivio cinematografico premium. Cerca e scopri dove guardare i tuoi film, serie TV e anime preferiti." />
  <meta name="keywords" content="cinema, film, serie tv, anime, archivio, streaming, dove guardare" />
  <meta name="author" content="Cinéma Archive" />

  <!-- Open Graph / Social Media -->
  <meta property="og:title" content="Cinéma Archive" />
  <meta property="og:description" content="Il tuo archivio cinematografico premium. Scopri film, serie TV e anime." />
  <meta property="og:type" content="website" />

  <!-- Favicon Placeholder -->
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎬</text></svg>">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Bebas+Neue&family=Inter:wght@300;400;600;700&family=Outfit:wght@300;400;600;800&display=swap"
    rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <!-- External Stylesheet -->
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div id="app">

    <!-- HEADER SECTION -->
    <header>
      <div class="strip" id="strip-top"></div>
      <div class="header-main" style="max-width:1100px; margin:0 auto; padding:40px 24px 44px; text-align:center">
        <div class="presenta"
          style="font-family:'Bebas Neue',sans-serif; font-size:12px; letter-spacing:10px; color:var(--gold-lo); margin-bottom:10px">
          PRESENTA</div>
        <h1 class="flicker"
          style="font-family:'Playfair Display',serif; font-weight:900; font-style:italic; font-size:clamp(48px, 10vw, 100px); line-height:0.9; color:var(--gold-hi); text-shadow:0 4px 30px rgba(240,192,96,0.25), 2px 2px 0 #3a2a08">
          Cinéma</h1>

        <div style="display:flex; align-items:center; justify-content:center; gap:20px; margin:12px 0 32px">
          <div class="rule" style="max-width:120px; flex:1"></div>
          <span
            style="font-family:'Bebas Neue',sans-serif; letter-spacing:8px; font-size:12px; color:var(--gold-lo)">ARCHIVE</span>
          <div class="rule" style="max-width:120px; flex:1"></div>
        </div>

        <!-- SEARCH COMPONENT -->
        <section id="search-wrap">
          <div id="mode-tabs">
            <button class="active" data-mode="all">TUTTO</button>
            <button data-mode="movie">FILM</button>
            <button data-mode="series">SERIE TV</button>
            <button data-mode="anime">ANIME</button>
          </div>

          <div id="search-box">
            <span id="search-icon">🎬</span>
            <input id="search-input" type="text" placeholder="Cerca film, serie TV o anime..." autocomplete="off" />
            <div id="search-spinner">
              <div class="spinner spin"></div>
            </div>
          </div>

          <div id="dropdown"></div>

          <p style="margin-top:20px; color:var(--dim); font-style:italic; font-size:15px; letter-spacing:0.5px">
            Film · Serie TV · Anime — cerca e scopri dove guardare
          </p>
        </section>
      </div>
      <div class="strip" id="strip-bottom"></div>
    </header>

    <!-- MAIN CONTENT AREA -->
    <main>
      <!-- HOME PAGE (GRID) -->
      <section id="home" class="fade-up">
        <div class="grid-title">
          <h2>Proiezioni in Evidenza</h2>
          <div class="rule" style="max-width:300px; margin:15px auto 0; opacity:0.5"></div>
        </div>

        <div id="trending-grid">
          <div class="loading-center">
            <div class="spinner spin"></div>
            <p style="color:var(--muted); margin-top:20px">Consultando gli archivi...</p>
          </div>
        </div>

        <div class="quote-box">
          <p class="quote-text">"Il cinema è uno specchio che riflette la realtà con la luce dell'immaginazione."</p>
          <p class="quote-attr">— CINÉMA ARCHIVE</p>
        </div>
      </section>

      <!-- DETAIL PAGE -->
      <section id="detail">
        <button class="back-btn" id="back-btn">← TORNA ALLA RICERCA</button>
        <div id="detail-content"></div>
      </section>
    </main>

    <!-- FOOTER SECTION -->
    <footer>
      <div class="strip"></div>
      <div class="footer-content">
        <a href="#" class="footer-brand">CINÉMA ARCHIVE</a>
        <div class="creator-credits">
          BY <span class="creator-name">SICKKKALE</span>
        </div>
        <div class="footer-links" style="display:flex; align-items:center">
          <div class="social-links" style="display:flex; gap:20px">
            <a href="#" target="_blank" class="social-link" title="GitHub"><i class="fa-brands fa-github"></i></a>
            <a href="#" target="_blank" class="social-link" title="Instagram"><i class="fa-brands fa-instagram"></i></a>
            <a href="#" target="_blank" class="social-link" title="Behance"><i class="fa-brands fa-behance"></i></a>
          </div>
        </div>
      </div>
    </footer>

  </div>

  <!-- Application Script -->
  <script src="app.js"></script>
</body>

</html>
